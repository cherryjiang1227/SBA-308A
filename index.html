<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pokédex</title>
  <link rel="stylesheet" href="style.css">
  <script type="module" src="./src/app.js"></script>
</head>
<body>
  <div class="main">
    <h1>Pokédex</h1>
    <p class="subtitle">Search for any Pokémon by name and add it to your team!</p>
    <div class="search">
      <input type="text" id="pokemonSearch" placeholder="Type Pokémon name...">
      <button id="searchBtn">Search</button>
    </div>
    <div id="searchResult">
      <h2 id="pokemonName"></h2>
      <img id="pokemonImage" src="https://www.freeiconspng.com/uploads/pokeball-pokemon-ball-picture-11.png" alt="Pokemon Image">
      <p id="pokemonId"></p>
      <p id="pokemonType"></p>
    </div>
    <button id="teamBtn">Add to Team</button>
    <h2>Team<span id="teamCount">(0/5)</span></h2>
    <ul id="team"></ul>
    <div id="message"></div>
  </div>
</body>
</html>
